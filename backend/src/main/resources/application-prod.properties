# ===================================================================
# PRODUCTION Profile — Render.com
# DataSource is configured programmatically in DataSourceConfig.java
# which converts Render's postgres:// URL to jdbc:postgresql://
# ===================================================================

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server port (Render sets $PORT automatically)
server.port=${PORT:8080}

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/tmp/uploads

# Brevo Email API
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL:rajrai092004@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:TnP Connect}

# Gemini AI
ai.gemini.api-key=${GEMINI_API_KEY}
ai.gemini.model=gemini-2.5-flash

# JWT
jwt.secret=${JWT_SECRET}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}
