# ===================================================================
# PRODUCTION Profile — Render.com
# Activated by: --spring.profiles.active=prod
# All secrets come from Render Environment Variables
# ===================================================================

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (Render sets $PORT automatically)
server.port=${PORT:8080}

# File uploads — use /tmp on Render (ephemeral but OK for demo)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/tmp/uploads

# Brevo Email API
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL:rajrai092004@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:TnP Connect}

# Gemini AI
ai.gemini.api-key=${GEMINI_API_KEY}
ai.gemini.model=gemini-2.5-flash

# JWT
jwt.secret=${JWT_SECRET}

# Disable open-in-view warning
spring.jpa.open-in-view=false
